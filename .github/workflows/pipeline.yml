name: Phishio CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
          python -m nltk.downloader stopwords punkt

      - name: Setup Firebase Credentials
        run: |
          mkdir -p runtime
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > runtime/secrets

      - name: Setup Mock Data for CI
        run: |
          mkdir -p data
          echo '{}' > data/document_map.json
          echo '{}' > data/norms.json
          echo '{}' > data/vocabulario.json
          echo '{}' > data/idf.json
          touch data/postings.bin
          touch data/idf_warm.db

      - name: Run Tests
        run: |
          PYTHONPATH=.:./runtime pytest tests/ -v

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip Chrome Extension
        run: |
          zip -r phishio_extension.zip extension/
      - name: Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Phishio Beta (Última Versão)
          files: phishio_extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
