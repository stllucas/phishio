name: Phishio CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
          # FIX DO NLTK: Baixando as stopwords direto no pipeline
          python -m nltk.downloader stopwords punkt

      - name: Setup Firebase Credentials
        run: |
          mkdir -p runtime/secrets
          echo "${{ secrets.FIREBASE_CREDENTIALS }}" > runtime/secrets/phishio-firebase-adminsdk.json

      - name: Run Tests
        run: |
          # FIX DO PYTHONPATH: Ensinando o Python a achar a pasta runtime e core
          PYTHONPATH=.:./runtime pytest tests/ -v

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip Chrome Extension
        run: |
          zip -r phishio_extension.zip extension/
